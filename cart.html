<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Keranjang Belanja – TokoKita</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">Toko<span>Kita</span></a>
    <ul class="nav-links">
      <li><a href="shop.html">Toko</a></li>
      <li><a href="shop.html?filter=sale">Sale 🔥</a></li>
    </ul>
    <div class="nav-right">
      <a href="account.html" class="nav-icon"><i class="fas fa-user"></i></a>
      <a href="wishlist.html" class="nav-icon"><i class="far fa-heart"></i><span class="badge" id="wishCount">0</span></a>
      <a href="cart.html" class="nav-icon" style="color:var(--pink)"><i class="fas fa-shopping-bag"></i><span class="badge" id="cartCount">0</span></a>
    </div>
  </div>
</nav>

<div class="page-hero" style="padding:32px 0;text-align:left">
  <div class="container">
    <h1><i class="fas fa-shopping-bag" style="color:var(--pink);margin-right:12px"></i>Keranjang Belanja</h1>
    <div class="breadcrumb" style="justify-content:flex-start;margin-top:8px">
      <a href="index.html">Beranda</a><i class="fas fa-chevron-right"></i><span>Keranjang</span>
    </div>
  </div>
</div>

<div class="container">
  <div class="cart-layout" id="cartLayout">
    <!-- JS rendered -->
  </div>
</div>

<section class="section bg-light" style="padding-top:40px">
  <div class="container">
    <div class="sec-header flex-between">
      <div><h2 class="sec-title">Jangan Lupa Ini</h2><p class="sec-sub">Produk yang mungkin Anda suka</p></div>
      <a href="shop.html" class="btn-link">Lihat Semua <i class="fas fa-arrow-right"></i></a>
    </div>
    <div class="prod-grid" id="suggestGrid"></div>
  </div>
</section>

<div class="toast-container" id="toastContainer"></div>

<footer class="footer">
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:24px 0;border-top:1px solid rgba(255,255,255,.08)">
      <div class="logo" style="color:#fff">Toko<span style="color:var(--pink)">Kita</span></div>
      <p style="font-size:.82rem;color:rgba(255,255,255,.4)">© 2026 TokoKita. Bangga Buatan Indonesia 🇮🇩</p>
    </div>
  </div>
</footer>

<script src="assets/js/data.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/main.js"></script>
<script>
let couponApplied = false;
let discount = 0;

function renderCart() {
  const cart = getCart();
  const layout = document.getElementById('cartLayout');
  if (cart.length === 0) {
    layout.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:80px 20px;background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200)">
        <i class="fas fa-shopping-bag" style="font-size:4rem;color:var(--gray-200);margin-bottom:20px;display:block"></i>
        <h2 style="font-size:1.3rem;margin-bottom:8px">Keranjang Anda Kosong</h2>
        <p style="color:var(--gray-500);margin-bottom:24px">Belum ada produk di keranjang. Yuk mulai belanja!</p>
        <a href="shop.html" class="btn-primary">Mulai Belanja</a>
      </div>`;
    return;
  }
  const subtotal = getCartTotal();
  const shipping = subtotal >= 150000 ? 0 : 15000;
  const total = subtotal + shipping - discount;

  layout.innerHTML = `
    <div>
      <div class="cart-table">
        <div class="cart-head">
          <span>Produk</span><span>Harga</span><span>Jumlah</span><span>Total</span><span></span>
        </div>
        ${cart.map(item => `
          <div class="cart-row">
            <div class="cart-product">
              <img src="${item.image}" alt="${item.name}"/>
              <div>
                <div class="cart-product-name"><a href="product.html?id=${item.id}" style="color:var(--dark);text-decoration:none">${item.name}</a></div>
                <div class="cart-product-var">Ukuran: ${item.size}</div>
                <button class="cart-product-remove" onclick="doRemove('${item.key}')"><i class="fas fa-trash-alt"></i> Hapus</button>
              </div>
            </div>
            <div style="font-weight:600;font-size:.9rem">${formatPrice(item.price)}</div>
            <div>
              <div class="qty-ctrl" style="width:fit-content">
                <button onclick="doQty('${item.key}',${item.qty-1})">−</button>
                <input type="number" value="${item.qty}" min="1" max="99" onchange="doQty('${item.key}',+this.value)" style="width:40px"/>
                <button onclick="doQty('${item.key}',${item.qty+1})">+</button>
              </div>
            </div>
            <div style="font-weight:700;color:var(--pink)">${formatPrice(item.price * item.qty)}</div>
            <button onclick="doRemove('${item.key}')" style="background:none;border:none;color:var(--gray-500);cursor:pointer;font-size:.9rem"><i class="fas fa-times"></i></button>
          </div>
        `).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:12px">
        <a href="shop.html" style="display:flex;align-items:center;gap:6px;font-size:.86rem;color:var(--gray-700);font-weight:500"><i class="fas fa-arrow-left"></i> Lanjut Belanja</a>
        <button onclick="clearCart()" style="border:1.5px solid var(--gray-300);background:#fff;border-radius:8px;padding:8px 16px;font-size:.84rem;cursor:pointer;color:var(--gray-700)"><i class="fas fa-trash" style="margin-right:6px"></i>Kosongkan Keranjang</button>
      </div>
    </div>
    <div>
      <div class="cart-summary">
        <h3>Ringkasan Pesanan</h3>
        <div class="summary-row"><span>Subtotal (${cart.reduce((s,i)=>s+i.qty,0)} item)</span><span>${formatPrice(subtotal)}</span></div>
        <div class="summary-row"><span>Ongkos Kirim</span><span style="color:${shipping===0?'#10b981':'inherit'}">${shipping===0?'GRATIS':formatPrice(shipping)}</span></div>
        ${discount>0?`<div class="summary-row" style="color:#10b981"><span>Diskon Kupon</span><span>−${formatPrice(discount)}</span></div>`:''}
        <div class="summary-row total"><span>Total</span><span style="color:var(--pink)">${formatPrice(total)}</span></div>
        <div class="coupon-row">
          <input type="text" placeholder="Kode kupon" id="couponInput" value="${couponApplied?'TOKOKITA20':''}"/>
          <button onclick="applyCoupon()">${couponApplied?'Terapkan ✓':'Terapkan'}</button>
        </div>
        ${subtotal < 150000 ? `<div style="background:#fff7ed;border-radius:8px;padding:10px 12px;font-size:.78rem;color:#d97706;margin-bottom:10px"><i class="fas fa-info-circle" style="margin-right:4px"></i>Tambah ${formatPrice(150000-subtotal)} lagi untuk gratis ongkir!</div>` : ''}
        <a href="checkout.html"><button class="btn-checkout-main"><i class="fas fa-lock" style="margin-right:8px"></i>Lanjut ke Pembayaran</button></a>
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;font-size:.76rem;color:var(--gray-500)">
          <i class="fas fa-shield-alt" style="color:#10b981"></i>
          Pembayaran 100% aman & terenkripsi
        </div>
      </div>
      <div style="background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);padding:16px;margin-top:12px">
        <div style="font-size:.8rem;font-weight:700;margin-bottom:10px;color:var(--dark)">Metode Pembayaran Tersedia</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${['DANA','GoPay','OVO','LinkAja','BCA','Mandiri','BNI','BRI','Kartu Kredit','Indomaret'].map(m=>`<span style="font-size:.7rem;border:1px solid var(--gray-300);border-radius:4px;padding:3px 8px;color:var(--gray-500)">${m}</span>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function doRemove(key) { removeFromCart(key); renderCart(); }
function doQty(key, qty) { updateCartQty(key, qty); renderCart(); }
function clearCart() {
  if (confirm('Yakin ingin mengosongkan keranjang?')) {
    localStorage.removeItem('tokokita_cart');
    updateCartUI();
    renderCart();
  }
}
function applyCoupon() {
  const code = document.getElementById('couponInput').value.trim().toUpperCase();
  if (code === 'TOKOKITA20') {
    discount = Math.floor(getCartTotal() * 0.2);
    couponApplied = true;
    showToast('🎉 Kupon berhasil diterapkan! Hemat 20%', 'success');
    renderCart();
  } else {
    showToast('Kode kupon tidak valid', 'error');
  }
}

// Seed cart with sample data if empty
if (getCart().length === 0) {
  const cart = [
    {key:'1-M-default',id:1,qty:1,name:'Dress Batik Floral Modern',brand:'BatikNusa Studio',price:189000,image:PRODUCTS[0].images[0],size:'M',color:'#8B4513'},
    {key:'3-ONE SIZE-default',id:3,qty:2,name:'Tas Anyaman Rotan Bali',brand:'BaliCraft',price:145000,image:PRODUCTS[2].images[0],size:'ONE SIZE',color:'#C4A265'},
    {key:'5-39-default',id:5,qty:1,name:'Sandal Kulit Jogja Handmade',brand:'LeatherJogja',price:178000,image:PRODUCTS[4].images[0],size:'39',color:'#8B4513'}
  ];
  localStorage.setItem('tokokita_cart', JSON.stringify(cart));
  updateCartUI();
}

renderCart();
renderProducts('suggestGrid', PRODUCTS.filter(p => p.isFeatured).slice(0,4));
</script>
</body>
</html>
