<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Masuk – TokoKita</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">Toko<span>Kita</span></a>
    <div style="font-size:.84rem;color:var(--gray-500)">Belum punya akun? <a href="register.html" style="color:var(--pink);font-weight:600">Daftar Gratis</a></div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><a href="index.html" class="logo">Toko<span>Kita</span></a></div>
    <h2>Selamat Datang Kembali!</h2>
    <p class="auth-sub">Masuk untuk melanjutkan belanja produk lokal terbaik</p>

    <button class="btn-social"><img src="https://www.svgrepo.com/show/475656/google-color.svg" style="width:18px;height:18px"/> Lanjutkan dengan Google</button>
    <button class="btn-social"><i class="fab fa-facebook" style="color:#1877f2;font-size:1.1rem"></i> Lanjutkan dengan Facebook</button>

    <div class="auth-divider"><span>atau masuk dengan email</span></div>

    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="email@contoh.com" required value="siti@email.com"/>
      </div>
      <div class="form-group">
        <label style="display:flex;justify-content:space-between">Email <a href="#" style="color:var(--pink);font-size:.76rem;font-weight:500">Lupa password?</a></label>
        <div style="position:relative">
          <input type="password" placeholder="Kata sandi" required value="123456" id="passInput" style="padding-right:44px"/>
          <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-500);cursor:pointer"><i class="fas fa-eye" id="eyeIcon"></i></button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
        <input type="checkbox" id="remember" style="accent-color:var(--pink)"/>
        <label for="remember" style="font-size:.84rem;cursor:pointer">Ingat saya di perangkat ini</label>
      </div>
      <button type="submit" class="auth-submit">Masuk</button>
    </form>

    <p class="auth-footer">Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
    <p style="text-align:center;font-size:.74rem;color:var(--gray-500);margin-top:10px">Dengan masuk, Anda setuju dengan <a href="#" style="color:var(--pink)">Syarat</a> & <a href="#" style="color:var(--pink)">Kebijakan Privasi</a> kami</p>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="assets/js/data.js"></script>
<script src="assets/js/cart.js"></script>
<script>
function doLogin(e){e.preventDefault();showToast('✅ Berhasil masuk! Selamat datang, Siti.','success');setTimeout(()=>window.location.href='account.html',1500);}
function togglePass(){const i=document.getElementById('passInput'),e=document.getElementById('eyeIcon');if(i.type==='password'){i.type='text';e.className='fas fa-eye-slash';}else{i.type='password';e.className='fas fa-eye';}}
</script>
</body>
</html>
